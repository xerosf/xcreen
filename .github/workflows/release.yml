name: release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build and Release (Windows)
    runs-on: windows-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Build (release, x86_64-pc-windows-msvc)
        shell: pwsh
        run: |
          cargo build --release --target x86_64-pc-windows-msvc

      - name: Extract version from Cargo.toml
        id: version
        shell: pwsh
        run: |
          $toml = Get-Content Cargo.toml -Raw
          if ($toml -match '(?m)^\s*version\s*=\s*"([0-9]+\.[0-9]+\.[0-9]+)"') {
            $version = $Matches[1]
          } else {
            Write-Error "Version not found in Cargo.toml"
          }
          "version=$version" | Out-File -FilePath $Env:GITHUB_OUTPUT -Append -Encoding utf8
          "tag=v$version" | Out-File -FilePath $Env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Prepare release bundle (zip)
        id: bundle
        shell: pwsh
        run: |
          $ReleaseDir = "target/x86_64-pc-windows-msvc/release"
          $ExePath = Join-Path $ReleaseDir "xcreen.exe"
          if (!(Test-Path $ExePath)) { Write-Error "Binary not found: $ExePath" }
          $ZipName = "xcreen-${{ steps.version.outputs.version }}-windows-x86_64.zip"
          $BundleDir = "xcreen-${{ steps.version.outputs.version }}-windows-x86_64"
          if (Test-Path $BundleDir) { Remove-Item $BundleDir -Recurse -Force }
          New-Item -ItemType Directory -Path $BundleDir | Out-Null

          # windows-reactor-setup stages the self-contained runtime beside the binary.
          Get-ChildItem $ReleaseDir -File | Where-Object {
            $_.Name -eq "xcreen.exe" -or $_.Extension -in ".dll", ".pri", ".xaml"
          } | Copy-Item -Destination $BundleDir
          Get-ChildItem $ReleaseDir -Directory | Where-Object {
            $_.Name -notin "build", "deps", "examples", "incremental"
          } | Copy-Item -Destination $BundleDir -Recurse
          Copy-Item LICENSE, README.md -Destination $BundleDir

          if (Test-Path $ZipName) { Remove-Item $ZipName -Force }
          Compress-Archive -Path $BundleDir -DestinationPath $ZipName -Force
          "zip=$ZipName" | Out-File -FilePath $Env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload artifact (CI)
        uses: actions/upload-artifact@v4
        with:
          name: xcreen-windows-${{ steps.version.outputs.version }}
          path: ${{ steps.bundle.outputs.zip }}
          if-no-files-found: error

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1.14.0
        with:
          tag: ${{ steps.version.outputs.tag }}
          name: xcreen ${{ steps.version.outputs.tag }}
          artifacts: ${{ steps.bundle.outputs.zip }}
          artifactContentType: application/zip
          generateReleaseNotes: true
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
