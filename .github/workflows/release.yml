name: release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build and Release (Windows)
    runs-on: windows-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Build (release, x86_64-pc-windows-msvc)
        shell: pwsh
        run: |
          cargo build --release --target x86_64-pc-windows-msvc

      - name: Extract version from Cargo.toml
        id: version
        shell: pwsh
        run: |
          $toml = Get-Content Cargo.toml -Raw
          if ($toml -match '(?m)^\s*version\s*=\s*"([0-9]+\.[0-9]+\.[0-9]+)"') {
            $version = $Matches[1]
          } else {
            Write-Error "Version not found in Cargo.toml"
          }
          "version=$version" | Out-File -FilePath $Env:GITHUB_OUTPUT -Append -Encoding utf8
          "tag=v$version" | Out-File -FilePath $Env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y

      - name: Build Installer
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DMyAppVersion="${{ steps.version.outputs.version }}" installer.iss

      - name: Upload artifact (CI)
        uses: actions/upload-artifact@v4
        with:
          name: XCreen-Setup-${{ steps.version.outputs.version }}
          path: XCreen-Setup-${{ steps.version.outputs.version }}.exe
          if-no-files-found: error

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1.14.0
        with:
          tag: ${{ steps.version.outputs.tag }}
          name: XCreen ${{ steps.version.outputs.tag }}
          artifacts: XCreen-Setup-${{ steps.version.outputs.version }}.exe
          generateReleaseNotes: true
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
