name: release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build and Release (Windows)
    runs-on: windows-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-pc-windows-msvc

      - name: Show rustup and rustc versions
        shell: pwsh
        run: |
          rustup show
          rustc -Vv

      - name: Build (release, x86_64-pc-windows-msvc)
        shell: pwsh
        run: |
          cargo build --release --target x86_64-pc-windows-msvc

      - name: Extract version from Cargo.toml
        id: version
        shell: pwsh
        run: |
          $toml = Get-Content Cargo.toml -Raw
          if ($toml -match '(?m)^\s*version\s*=\s*"([0-9]+\.[0-9]+\.[0-9]+)"') {
            $version = $Matches[1]
          } else {
            Write-Error "Version not found in Cargo.toml"
          }
          "version=$version" | Out-File -FilePath $Env:GITHUB_OUTPUT -Append -Encoding utf8
          "tag=v$version" | Out-File -FilePath $Env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Prepare release bundle (zip)
        id: bundle
        shell: pwsh
        run: |
          $ExePath = Join-Path "target/x86_64-pc-windows-msvc/release" "xcreen.exe"
          if (!(Test-Path $ExePath)) { Write-Error "Binary not found: $ExePath" }
          $ZipName = "xcreen-$(${env:GITHUB_REF_NAME})-${{ steps.version.outputs.version }}-windows-x86_64.zip"
          # Use a stable file name that doesn't depend on branch name
          $ZipName = "xcreen-${{ steps.version.outputs.version }}-windows-x86_64.zip"
          if (Test-Path $ZipName) { Remove-Item $ZipName -Force }
          Compress-Archive -Path $ExePath, LICENSE, README.md -DestinationPath $ZipName -Force
          "zip=$ZipName" | Out-File -FilePath $Env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload artifact (CI)
        uses: actions/upload-artifact@v4
        with:
          name: xcreen-windows-${{ steps.version.outputs.version }}
          path: ${{ steps.bundle.outputs.zip }}
          if-no-files-found: error

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1.14.0
        with:
          tag: ${{ steps.version.outputs.tag }}
          name: XCreen ${{ steps.version.outputs.tag }}
          artifacts: ${{ steps.bundle.outputs.zip }}
          artifactContentType: application/zip
          generateReleaseNotes: true
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
